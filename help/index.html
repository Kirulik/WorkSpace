<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UniServer Script API</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-name">UniServer</div>
        <div class="brand-sub">Script API</div>
      </div>
      <label class="search-wrap">
        <span class="search-label">Поиск</span>
        <input id="search" type="search" placeholder="Функция, раздел…" autocomplete="off" />
      </label>
      <div id="search-results" class="search-results hidden"></div>
      <nav id="nav" class="nav" aria-label="Разделы"></nav>
    </aside>
    <main class="main">
      <header class="top">
        <h1 id="page-title">Справка</h1>
        <p id="page-lead" class="lead"></p>
      </header>
      <article id="content" class="content"></article>
    </main>
  </div>
  <script src="./js/search-data.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
