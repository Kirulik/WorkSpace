site_name: UniServer Script API
site_description: Справка по API сценариев UniServer (PascalScript)
site_author: VesySoft
docs_dir: UniServer-Script-Docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: ru
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - search.suggest
    - search.highlight
    - search.share
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy

plugins:
  - search:
      lang:
        - ru
        - en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

extra:
  generator: false

nav:
  - Главная: index.md
  - Общие функции: 01-obshchie-funktsii.md
  - Работа с файлами: 02-rabota-s-faylami.md
  - Работа со строками: 03-rabota-so-strokami.md
  - Дата и время: 04-data-i-vremya.md
  - Hex-преобразование: 05-hex-preobrazovanie.md
  - Формат вещественных: 06-format-veschestvennyh.md
  - CRC8 и CRC16: 07-crc8-crc16.md
  - Типы данных: 08-tipy-dannyh.md
  - JSON-объекты: 09-json-obekty.md
  - Функции сервера: 10-obshchie-funktsii-servera.md
  - Отправка сообщений: 11-otpravka-soobscheniy.md
  - Глобальные переменные: 12-globalnye-peremennye.md
  - Интерфейс сервера: 13-interfeys-servera.md
  - Универсальные журналы: 14-universalnye-zhurnaly.md
